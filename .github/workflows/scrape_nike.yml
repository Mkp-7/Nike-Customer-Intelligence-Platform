name: Scrape Nike Catalog

on:
  push:
    paths:
      - 'config.py'           # runs when you update config
  schedule:
    - cron: '0 8 * * 1'      # every Monday 8am UTC (weekly refresh)
  workflow_dispatch:           # manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Nike catalog
        run: python scrape_nike_catalog.py

      - name: Commit catalog to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nike_catalog.csv
          git diff --staged --quiet || git commit -m "Auto-update Nike catalog [skip ci]"
          git push
